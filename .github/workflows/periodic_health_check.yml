name: Periodic Health Check

on:
  workflow_dispatch:
    inputs:
      url:
        description: URL to check
        required: false
        default: https://fullstackopen-ci-cd-f6gz.onrender.com
  schedule:
    - cron: '0 8 * * *'

jobs:
  health_check:
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy URL
        uses: jtalk/url-health-check-action@v5
        with:
          url: ${{ inputs.url || 'https://fullstackopen-ci-cd-f6gz.onrender.com' }}
          follow-redirect: false
          max-attempts: 3
          retry-delay: 5s
